<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calyx AI - Fitness Coach</title>
    <link rel="stylesheet" href="static/style.css">
    <style>
        .chat-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .chat-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 60px rgba(255, 129, 255, 0.1), inset 0 0 60px rgba(255, 129, 255, 0.03);
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .chat-header {
            background: rgba(12, 14, 29, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 129, 255, 0.2);
            padding: 20px;
            color: var(--text-primary);
            text-align: center;
            position: relative;
        }
        
        .chat-header h2 {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--neon-pink) 0%, var(--neon-cyan) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 129, 255, 0.5);
        }
        
        .chat-header p {
            margin: 5px 0 0 0;
            opacity: 0.8;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .status-box {
            background: rgba(33, 31, 54, 0.6);
            backdrop-filter: blur(10px);
            padding: 12px;
            text-align: center;
            font-weight: 600;
            color: var(--neon-cyan);
            border-bottom: 1px solid rgba(81, 250, 170, 0.2);
            font-size: 0.95rem;
            text-shadow: 0 0 10px rgba(81, 250, 170, 0.4);
        }

        .chat-messages {
            height: 480px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: transparent;
        }

        /* custom scrollbar for dark theme */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 129, 255, 0.3);
            border-radius: 4px;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(33, 31, 54, 0.8);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            border: 1px solid rgba(81, 250, 170, 0.3);
            border-bottom-left-radius: 4px;
            box-shadow: 0 0 15px rgba(81, 250, 170, 0.1);
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--neon-pink) 0%, #a264a2 100%);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 129, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 129, 255, 0.2);
            font-weight: 500;
        }

        /* Format bot html content slightly */
        .message.bot p { margin: 0 0 10px 0; }
        .message.bot p:last-child { margin: 0; }
        .message.bot ul { margin: 5px 0; padding-left: 20px; color: rgba(255,255,255,0.9); }
        .message.bot strong { color: var(--neon-cyan); font-weight: 600; text-shadow: 0 0 5px rgba(81, 250, 170, 0.3); }
        
        .chat-input-area {
            display: flex;
            padding: 18px;
            background: rgba(12, 14, 29, 0.5);
            border-top: 1px solid rgba(255, 129, 255, 0.2);
            gap: 12px;
            align-items: center;
        }

        .chat-input-area input {
            flex-grow: 1;
            padding: 14px 20px;
            background: rgba(12, 14, 29, 0.6);
            border: 2px solid rgba(255, 129, 255, 0.3);
            border-radius: 25px;
            font-size: 1rem;
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .chat-input-area input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .chat-input-area input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(81, 250, 170, 0.2), inset 0 0 8px rgba(81, 250, 170, 0.08);
            background: rgba(12, 14, 29, 0.8);
        }

        .send-btn, .clear-btn {
            border: none;
            cursor: pointer;
            border-radius: 25px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
            color: var(--bg-primary);
        }

        .send-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--neon-pink) 0%, var(--neon-cyan) 100%);
            font-size: 1.05rem;
            box-shadow: 0 0 20px rgba(255, 129, 255, 0.3);
        }
        
        .clear-btn {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 129, 255, 0.4), 0 0 60px rgba(81, 250, 170, 0.3);
        }
        
        .clear-btn:hover {
            background: rgba(255, 50, 50, 0.2);
            border-color: rgba(255, 50, 50, 0.5);
            color: #ff8181;
            transform: scale(1.05);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: rgba(33, 31, 54, 0.6);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 129, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <header>
        <div class="container">
            <h1>🔥 Calorie AI</h1>
            <nav>
                <a href="/">Home</a>
                <a href="/predict">Predict</a>
                <a href="/chat" class="active">Calyx AI</a>
            </nav>
        </div>
    </header>

    <main class="chat-layout">
        <div class="chat-container">
            <div class="chat-header">
                <h2>🏋️‍♂️ Calyx AI</h2>
                <p>Your Personal Fitness & Nutrition Assistant</p>
            </div>
            
            <div class="status-box" id="statusBox">
                Loading...
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- Messages will be appended here -->
                <div class="typing-indicator" id="typingIndicator">Calyx AI is typing...</div>
            </div>
            
            <div class="chat-input-area">
                <button class="clear-btn" id="clearBtn" title="Start Over">🔄</button>
                <input type="text" id="userInput" placeholder="Tell me about your fitness goals, age, weight..." autocomplete="off">
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Calorie AI. Powered by Machine Learning & Calyx AI.</p>
        </div>
    </footer>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusBox = document.getElementById('statusBox');
        const typingIndicator = document.getElementById('typingIndicator');

        let isWaiting = false;

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            // Allow basic HTML formatting for bot
            if(role === 'bot') {
                // Convert newlines to breaks and parse **bold** matching the neon-cyan theme
                let formattedContent = content
                    .replace(/\n\n/g, '<br><br>')
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                div.innerHTML = formattedContent;
            } else {
                div.textContent = content;
            }
            
            chatMessages.insertBefore(div, typingIndicator);
            scrollToBottom();
        }

        function updateUI(data) {
            // Clear existing messages except typing indicator
            const messages = chatMessages.querySelectorAll('.message');
            messages.forEach(m => m.remove());
            
            // Add all history
            if (data.history && data.history.length > 0) {
                data.history.forEach(item => {
                    appendMessage(item.role, item.content);
                });
            }
            
            if (data.status) {
                statusBox.innerHTML = data.status;
            }
        }

        async function sendMessage(message = '', clear = false) {
            if (isWaiting) return;
            isWaiting = true;
            
            if (message && !clear) {
                appendMessage('user', message);
                userInput.value = '';
            }
            
            typingIndicator.style.display = 'block';
            scrollToBottom();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, clear })
                });
                
                const data = await response.json();
                updateUI(data);
                
            } catch (err) {
                statusBox.innerHTML = '❌ Network error communicating with Calyx AI.';
            } finally {
                typingIndicator.style.display = 'none';
                isWaiting = false;
                userInput.focus();
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', () => {
            const text = userInput.value.trim();
            if (text) sendMessage(text);
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = userInput.value.trim();
                if (text) sendMessage(text);
            }
        });

        clearBtn.addEventListener('click', () => {
             if(confirm("Are you sure you want to start over?")) {
                 sendMessage('', true);
             }
        });

        // Initial load
        window.onload = () => {
            sendMessage('', false);
        };
    </script>
</body>
</html>
